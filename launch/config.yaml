# frame
evaluation:
  enabled: true
  match_key: "stamp"
  use_timestamped_filename: true
  class_name: "Pedestrian"
  ground_truth_file: "/home/firo/Documents/workspace/OpenPCDet_ws/src/OpenPCDet_ros/result/eval_generated/20251020_part2_ground_truth.csv"
